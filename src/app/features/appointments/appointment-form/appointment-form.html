<section class="feature form-page">
  <div class="form-page__top">
    <a mat-button type="button" routerLink="/appointments" class="back-link">
      ← Volver
    </a>
    <h1 class="form-page__title">Nueva cita</h1>
  </div>

  <ng-container *ngIf="isLoadingMeta(); else formTemplate">
    <p class="muted">Cargando especialidades…</p>
  </ng-container>

  <ng-template #formTemplate>
    <form class="appt-form" (ngSubmit)="submit()" [formGroup]="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Especialidad</mat-label>
        <mat-select formControlName="specialty" required>
          <mat-option *ngFor="let s of specialties()" [value]="s">{{ s }}</mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('specialty')?.invalid && form.get('specialty')?.touched">
          Selecciona una especialidad
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Médico</mat-label>
        <mat-select formControlName="doctorId" required>
          <mat-option *ngFor="let d of doctors()" [value]="d.id">{{ d.name }}</mat-option>
        </mat-select>
        <mat-hint *ngIf="form.get('specialty')?.value && doctors().length === 0">
          No hay médicos disponibles para esta especialidad
        </mat-hint>
        <mat-error *ngIf="form.get('doctorId')?.invalid && form.get('doctorId')?.touched">
          Selecciona un médico
        </mat-error>
      </mat-form-field>

      <div class="row">
        <mat-form-field appearance="outline" class="grow">
          <mat-label>Fecha</mat-label>
          <input
            matInput
            [matDatepicker]="picker"
            formControlName="date"
            [min]="minDate"
          />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-error *ngIf="form.get('date')?.invalid && form.get('date')?.touched">
            Elige una fecha
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="time-field">
          <mat-label>Hora</mat-label>
          <input matInput type="time" formControlName="time" />
          <mat-error *ngIf="form.get('time')?.invalid && form.get('time')?.touched">
            Indica la hora
          </mat-error>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Modalidad</mat-label>
        <mat-select formControlName="modality" required>
          <mat-option [value]="AppointmentModality.inPerson"
            >Presencial</mat-option
          >
          <mat-option [value]="AppointmentModality.virtual">Virtual</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Notas (opcional)</mat-label>
        <textarea
          matInput
          formControlName="notes"
          rows="3"
          placeholder="Motivo de la consulta, preferencias, etc."
        ></textarea>
      </mat-form-field>

      <div class="form-actions">
        <button
          mat-raised-button
          class="btn-primary-teal"
          type="submit"
          [disabled]="isSubmitting()"
        >
          Confirmar cita
        </button>
      </div>
    </form>
  </ng-template>
</section>
